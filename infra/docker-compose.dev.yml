version: "3.9"

# Apenas banco de dados para desenvolvimento local
# Use: docker compose -f infra/docker-compose.dev.yml up -d
# Depois rode: npm run dev (separadamente)

services:
  db:
    image: mysql:8.0
    container_name: metriq_db_dev
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: metriq
      MYSQL_USER: metriq
      MYSQL_PASSWORD: metriq
    ports:
      - "3306:3306"
    volumes:
      - mysql_data_dev:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql_data_dev:
    driver: local
