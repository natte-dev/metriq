version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: metriq_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: metriq
      MYSQL_USER: metriq
      MYSQL_PASSWORD: metriq
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  app:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: metriq_app
    environment:
      DATABASE_URL: "mysql://metriq:metriq@db:3306/metriq"
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local
